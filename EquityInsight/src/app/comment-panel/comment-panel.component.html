<section class="panel">
  <header class="panel-header">
    <h2>Comments</h2>
  </header>

  <p *ngIf="errorMessage" class="status-message error">{{ errorMessage }}</p>

  <ng-container *ngIf="selectedStockId !== null; else noStock">
    <div class="panel-actions">
      <textarea
        [(ngModel)]="newCommentContent"
        rows="4"
        [disabled]="isSubmitting"
        placeholder="Comment"
      ></textarea>

      <button
        type="button"
        [disabled]="isSubmitting || !newCommentContent.trim()"
        (click)="createComment()">
        Add
      </button>
    </div>

    <p *ngIf="comments.length === 0" class="status-message">
      No comments
    </p>

    <ul *ngIf="comments.length > 0" class="item-list">
      <li *ngFor="let comment of comments">
        <div class="comment-card">
          <ng-container *ngIf="editingCommentId === comment.id; else viewMode">
            <textarea
              [(ngModel)]="editedContent"
              rows="4"
              [disabled]="isSubmitting">
            </textarea>

            <div class="row-actions">
              <button
                type="button"
                [disabled]="isSubmitting || !editedContent.trim()"
                (click)="saveEdit(comment.id)">
                Save
              </button>
              <button type="button" [disabled]="isSubmitting" (click)="cancelEdit()">Cancel</button>
            </div>
          </ng-container>

          <ng-template #viewMode>
            <p>{{ comment.content }}</p>

            <small>
              Created {{ comment.creationDate | date:'short' }}<br />
              Edited {{ comment.lastEditedDate | date:'short' }}
            </small>

            <div class="row-actions">
              <button
                type="button"
                [disabled]="isSubmitting"
                (click)="startEdit(comment.id, comment.content)">
                Edit
              </button>
              <button
                type="button"
                [disabled]="isSubmitting"
                (click)="deleteComment(comment.id)">
                Delete
              </button>
            </div>
          </ng-template>
        </div>
      </li>
    </ul>
  </ng-container>

  <ng-template #noStock>
    <p class="status-message">Select stock</p>
  </ng-template>
</section>
