<div class="dashboard-layout">
  <app-watchlist-panel
    [reloadVersion]="watchlistRefreshVersion"
    [selectedStockId]="selectedStockId"
    (watchlistSelected)="onWatchlistSelected($event)"
    (stockSelected)="onStockSelected($event)">
  </app-watchlist-panel>

  <app-stock-detail-panel
    [selectedWatchlist]="selectedWatchlist"
    [selectedStockId]="selectedStockId"
    (watchlistStocksChanged)="onWatchlistStocksChanged()"
    (stockSelected)="onStockSelected($event)">
  </app-stock-detail-panel>

  <app-comment-panel
    [selectedStockId]="selectedStockId">
  </app-comment-panel>
</div>
