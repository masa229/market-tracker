<div class="dashboard-layout">
  <app-watchlist-panel
    (watchlistSelected)="onWatchlistSelected($event)">
  </app-watchlist-panel>

  <app-stock-detail-panel
    [selectedWatchlistId]="selectedWatchlistId"
    (stockSelected)="onStockSelected($event)">
  </app-stock-detail-panel>

  <app-comment-panel
    [selectedStockId]="selectedStockId">
  </app-comment-panel>
</div>
