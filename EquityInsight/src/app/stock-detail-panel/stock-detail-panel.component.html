<section class="panel">
  <header *ngIf="selectedStockId !== null" class="panel-header">
    <h2>Stock</h2>
  </header>

  <p *ngIf="stockActionErrorMessage" class="status-message error">{{ stockActionErrorMessage }}</p>
  <p *ngIf="chartErrorMessage" class="status-message error">{{ chartErrorMessage }}</p>

  <div *ngIf="selectedWatchlist" class="panel-actions">
    <input
      type="text"
      [ngModel]="tickerInput"
      (ngModelChange)="onTickerInputChange($event)"
      maxlength="4"
      [disabled]="isMutatingStocks"
      autocomplete="off"
      spellcheck="false"
      placeholder="Ticker" />
    <button
      type="button"
      [disabled]="isMutatingStocks || !isTickerInputValid"
      (click)="addStock()">
      Add
    </button>
  </div>

  <p *ngIf="selectedWatchlist && tickerInput && !isTickerInputValid" class="status-message">
    Use 1-4 letters or numbers
  </p>

  <section class="graph-card" [class.graph-card-empty]="selectedStockId === null">
    <div *ngIf="selectedStockId !== null" class="graph-card-header">
      <div>
        <h3>{{ selectedStock?.tickerSymbol ?? 'Price history' }}</h3>
      </div>

      <div class="range-selector">
        <button
          *ngFor="let range of supportedRanges"
          type="button"
          class="range-button"
          [class.active]="range === selectedRange"
          [disabled]="selectedStockId === null"
          (click)="changeRange(range)">
          {{ range }}
        </button>
      </div>
    </div>

    <p *ngIf="isChartLoading && selectedStockId !== null" class="status-message">Loading...</p>

    <div *ngIf="selectedStockId === null" class="welcome-state">
      Welcome to equity insight
    </div>

    <div #chartRef class="chart-container" [class.chart-container-empty]="selectedStockId === null"></div>
  </section>
</section>
